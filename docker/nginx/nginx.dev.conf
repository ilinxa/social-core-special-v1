# =============================================================================
# NGINX DEVELOPMENT CONFIGURATION
# =============================================================================
# Simplified configuration for local development (hybrid mode):
#   - No SSL (HTTP only)
#   - Connects to Django running on HOST machine (not in container)
#   - No caching
#   - Detailed error logging
#   - WebSocket support
#
# Usage:
#   docker compose -f docker-compose.dev.yml --profile nginx up -d
#
# Note: Django must be running on localhost:8000
# =============================================================================

user nginx;
worker_processes 1;

error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Detailed logging for debugging
    log_format dev '$remote_addr - [$time_local] "$request" '
                   '$status $body_bytes_sent '
                   'rt=$request_time';

    access_log /var/log/nginx/access.log dev;

    sendfile on;
    keepalive_timeout 65;

    # No gzip in dev for easier debugging
    gzip off;

    # ─────────────────────────────────────────────────────────────────────────
    # UPSTREAM - Django running on HOST machine
    # ─────────────────────────────────────────────────────────────────────────
    # host.docker.internal resolves to the host machine from inside Docker
    # This works on Docker Desktop (Windows/Mac). On Linux, you may need to
    # add --add-host=host.docker.internal:host-gateway to docker run
    # ─────────────────────────────────────────────────────────────────────────
    upstream django {
        server host.docker.internal:8000;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP SERVER
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Allow large uploads in dev
        client_max_body_size 100M;

        # ─────────────────────────────────────────────────────────────────────
        # STATIC & MEDIA FILES
        # ─────────────────────────────────────────────────────────────────────
        # In hybrid dev mode, Django serves static/media directly via runserver
        # These are proxied to Django like all other requests
        # ─────────────────────────────────────────────────────────────────────

        # ─────────────────────────────────────────────────────────────────────
        # WEBSOCKET
        # ─────────────────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for WebSocket
            proxy_read_timeout 86400;
        }

        # ─────────────────────────────────────────────────────────────────────
        # ALL OTHER REQUESTS
        # ─────────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for debugging
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # ─────────────────────────────────────────────────────────────────────
        # HEALTH CHECK
        # ─────────────────────────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
