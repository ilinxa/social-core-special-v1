# =============================================================================
# NGINX PRODUCTION CONFIGURATION
# =============================================================================
# This configuration is optimized for production deployments with:
#   - SSL/TLS termination with modern security settings
#   - HTTP/2 support
#   - Gzip compression
#   - Static file caching
#   - Security headers
#   - Rate limiting
#   - WebSocket support
#   - Proxy buffering
# =============================================================================

# Run as non-root user for security
user nginx;

# Auto-detect number of CPU cores
worker_processes auto;

# Error log location
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ─────────────────────────────────────────────────────────────────────────────
# EVENTS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
events {
    # Maximum connections per worker
    worker_connections 1024;

    # Accept multiple connections at once
    multi_accept on;

    # Use efficient connection method
    use epoll;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
http {
    # ─────────────────────────────────────────────────────────────────────────
    # BASIC SETTINGS
    # ─────────────────────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Hide Nginx version
    server_tokens off;

    # ─────────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────────
    # RATE LIMITING
    # ─────────────────────────────────────────────────────────────────────────
    # Limit requests per IP (10 requests/second with burst of 20)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Limit connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─────────────────────────────────────────────────────────────────────────
    # UPSTREAM CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────────
    upstream django {
        # Django application server
        server app:8000;

        # Keepalive connections to upstream
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP SERVER (Redirect to HTTPS)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTPS SERVER (Main Configuration)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # ─────────────────────────────────────────────────────────────────────
        # SSL CONFIGURATION
        # ─────────────────────────────────────────────────────────────────────
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session configuration
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling (uncomment if you have a valid certificate chain)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ─────────────────────────────────────────────────────────────────────
        # SECURITY HEADERS
        # ─────────────────────────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Content Security Policy (customize as needed)
        # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

        # ─────────────────────────────────────────────────────────────────────
        # CLIENT CONFIGURATION
        # ─────────────────────────────────────────────────────────────────────
        # Maximum upload size
        client_max_body_size 50M;
        client_body_buffer_size 128k;

        # Connection limits
        limit_conn conn_limit 20;

        # ─────────────────────────────────────────────────────────────────────
        # STATIC FILES
        # ─────────────────────────────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;

            # Cache static files for 1 year
            expires 1y;
            add_header Cache-Control "public, immutable";

            # Disable access logging for static files
            access_log off;

            # Enable gzip for static files
            gzip_static on;
        }

        # ─────────────────────────────────────────────────────────────────────
        # MEDIA FILES (User Uploads)
        # ─────────────────────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;

            # Cache media files for 30 days
            expires 30d;
            add_header Cache-Control "public";

            # Security: Prevent execution of uploaded files
            add_header X-Content-Type-Options "nosniff";
        }

        # ─────────────────────────────────────────────────────────────────────
        # API ENDPOINTS
        # ─────────────────────────────────────────────────────────────────────
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy to Django
            proxy_pass http://django;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ─────────────────────────────────────────────────────────────────────
        # ADMIN (Stricter Rate Limiting)
        # ─────────────────────────────────────────────────────────────────────
        location /admin/ {
            # Stricter rate limiting for admin
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://django;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─────────────────────────────────────────────────────────────────────
        # WEBSOCKET SUPPORT
        # ─────────────────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts (longer for persistent connections)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # ─────────────────────────────────────────────────────────────────────
        # DEFAULT (All Other Requests)
        # ─────────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─────────────────────────────────────────────────────────────────────
        # HEALTH CHECK ENDPOINT
        # ─────────────────────────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ─────────────────────────────────────────────────────────────────────
        # ERROR PAGES
        # ─────────────────────────────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
