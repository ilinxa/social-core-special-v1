# =============================================================================
# E2E CI Overrides — Layered on top of docker-compose.e2e.yml
# =============================================================================
# Usage: docker compose -f docker-compose.e2e.yml -f docker-compose.ci.yml up -d
#
# CI-specific changes:
#   - Reduced healthcheck intervals for faster startup detection
#   - Quieter logging (DJANGO_LOG_LEVEL=WARNING)
#   - Workflows use `docker compose down -v` for clean state between runs
# =============================================================================

services:
  postgres-e2e:
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 15

  redis-e2e:
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 10

  backend-e2e:
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      DJANGO_LOG_LEVEL: WARNING

  frontend-e2e:
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
