[pytest]
# Django settings module for testing
DJANGO_SETTINGS_MODULE = backend_core.settings.local

# Test file discovery patterns
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Default command line options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --showlocals

# Custom markers (register to avoid warnings)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that test cross-boundary behavior
    celery: marks tests that exercise Celery tasks

# Directories to ignore during test collection
norecursedirs =
    .git
    .tox
    .env
    venv
    dist
    build
    migrations
    __pycache__
    node_modules
    staticfiles

# Minimum version required
minversion = 7.0

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
