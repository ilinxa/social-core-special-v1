[flake8]
max-line-length = 88
extend-select = B
extend-ignore = E203,E501,W503,F821
max-complexity = 25
exclude =
    migrations,
    venv,
    __pycache__,
    .git,
    staticfiles
per-file-ignores =
    __init__.py:F401
    */settings/*.py:E501,F401,F403,F405,E712,W293
    conftest.py:F401,E402
    scripts/*.py:E402,F401,F541
    test_*.py:F401,F811,F841,B007,B017,F541,E741
    tests/factories.py:F401
    */validators.py:C901
    asgi.py:E402
    celery.py:E402
    wsgi.py:E402
